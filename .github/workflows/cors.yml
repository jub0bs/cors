name: build

on: [push]

permissions: read-all

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        go-version: [1.25, 1.26]
    name: Tests ${{ matrix.os }} @ Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Source
        uses: actions/checkout@v6.0.1
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.2.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Display Go version
        run: go version
      - name: Test
        run: go test -race -v -shuffle on -coverprofile cover.out ./...
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jub0bs/cors
  benchmark:
    # Mostly to compare allocations;
    # measurements of execution speed in GitHub Actions are unreliable.
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest]
        go-version: [1.25, 1.26]
    name: Benchmark comparison ${{ matrix.os }} @ Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Code (new)
        uses: actions/checkout@v6.0.1
        with:
          path: new
          fetch-depth: '0' # fetch all history for all branches and tags
      - name: Retrieve latest tag
        id: latest-tag
        run: |
          cd new
          echo "LATEST_TAG=$(git for-each-ref --sort=-version:refname --format='%(refname:lstrip=2)' --count=1 refs/tags)" >> "$GITHUB_OUTPUT"
      - name: Check out Code (old)
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ steps.latest-tag.outputs.LATEST_TAG }}
          path: old
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.2.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install benchinit
        run: go install mvdan.cc/benchinit@latest
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Run benchinit (old)
        run: |
          cd old
          benchinit -count 20 ./... > bench_init.out
      - name: Run benchinit (new)
        run: |
          cd new
          benchinit -count 20 ./... > bench_init.out
      - name: Run benchstat for package initialization
        run: |
          benchstat old/bench_init.out new/bench_init.out
      - name: Run Benchmark (old)
        run: |
          cd old
          # Run benchmarks several times with different layouts to reduce noise.
          x=101; while [ $x -le 105 ]; do
            echo "starting randlayout=$x"
            go test -shuffle on \
              -run ^$ \
              -bench '^BenchmarkMiddleware|^BenchmarkAll' \
              -count 6 \
              -benchtime 500ms \
              -ldflags "-randlayout=$x" \
              . ./cfgerrors \
              >> bench.out
            sleep 1
            x=$((x+1))
          done
      - name: Run Benchmark (new)
        run: |
          cd new
          # Run benchmarks several times with different layouts to reduce noise.
          x=101; while [ $x -le 105 ]; do
            echo "starting randlayout=$x"
            go test -shuffle on \
              -run ^$ \
              -bench '^BenchmarkMiddleware|^BenchmarkAll' \
              -count 6 \
              -benchtime 500ms \
              -ldflags "-randlayout=$x" \
              . ./cfgerrors \
              >> bench.out
            sleep 1
            x=$((x+1))
          done
      - name: Run benchstat for middleware initialization (new vs old)
        run: |
          benchstat -filter "/type:init" old/bench.out new/bench.out
      - name: Run benchstat for middleware Config method (new vs old)
        run: |
          benchstat -filter "/type:config" old/bench.out new/bench.out
      - name: Run benchstat for middleware execution (new vs old)
        run: |
          benchstat -filter "/type:exec" old/bench.out new/bench.out
      - name: Run benchstat for cfgerrors.All (new vs old)
        run: |
          benchstat -filter '.name:All' old/bench.out new/bench.out
      - name: Install gotip
        run: |
          go install golang.org/dl/gotip@latest
          gotip download
          gotip version
      - name: Run Benchmark (new at tip)
        run: |
          cd new
          # Run benchmarks several times with different layouts to reduce noise.
          x=101; while [ $x -le 105 ]; do
            echo "starting randlayout=$x"
            gotip test -shuffle on \
              -run ^$ \
              -bench '^BenchmarkMiddleware|^BenchmarkAll' \
              -count 6 \
              -benchtime 500ms \
              -ldflags "-randlayout=$x" \
              . ./cfgerrors \
              >> bench_tip.out
            sleep 1
            x=$((x+1))
          done
      - name: Run benchstat for middleware initialization (gotip vs go${{ matrix.go-version }})
        run: |
          benchstat -filter "/type:init" new/bench.out new/bench_tip.out
      - name: Run benchstat for middleware Config method (gotip vs go${{ matrix.go-version }})
        run: |
          benchstat -filter "/type:config" new/bench.out new/bench_tip.out
      - name: Run benchstat for middleware execution (gotip vs go${{ matrix.go-version }})
        run: |
          benchstat -filter "/type:exec" new/bench.out new/bench_tip.out
      - name: Run benchstat for cfgerrors.All (gotip vs go${{ matrix.go-version }})
        run: |
          benchstat -filter '.name:All' new/bench.out new/bench_tip.out
